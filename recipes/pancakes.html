    <h2>Description</h2>
    <p>Healthy whole wheat pancakes made in Sarbloh Bibek style.</p>

    <h2>Ingredients</h2>
    <ul>
        <li>Whole wheat flour</li>
        <li>Milk or water</li>
        <li>Banana</li>
        <li>Ghee</li>
        <li>Jaggery or salt</li>
    </ul>

    <h2>Steps</h2>
    <ol>
        <li>Make batter.</li>
        <li>Heat pan with ghee.</li>
        <li>Cook pancakes both sides.</li>
        <li>Serve warm.</li>
    </ol>
